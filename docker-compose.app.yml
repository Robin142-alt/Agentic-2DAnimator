services:
  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@db:5432/stickstory
      JWT_SECRET: change-me-in-prod-change-me
      APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: stickstory
    ports:
      - "5432:5432"
    volumes:
      - stickstory_db:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

volumes:
  stickstory_db:

